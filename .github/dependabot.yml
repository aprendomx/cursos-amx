version: 2
updates:
  # App principal (Vue 3 + Vite)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-y-patch:
        update-types:
          - minor
          - patch

  # Worker de video (Node)
  - package-ecosystem: npm
    directory: /services/video-worker
    schedule:
      interval: weekly

  # Servicio de transcripción (Python)
  - package-ecosystem: pip
    directory: /services/whisper-service
    schedule:
      interval: weekly

  # Actions de los workflows de CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
